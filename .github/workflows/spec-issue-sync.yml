name: Spec Issue Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/dev/specs/**/spec.md'

jobs:
  sync-issue:
    name: Sync Spec to Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Specs
        id: changed-specs
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$after_sha" | grep '^docs/dev/specs/.*/spec\.md$' || true)"
          else
            changed_files="$(git diff --name-only "$before_sha" "$after_sha" | grep '^docs/dev/specs/.*/spec\.md$' || true)"
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "$changed_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Process Each Spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bash scripts/spec-issue-sync-map.sh validate

          while IFS= read -r file; do
            if [ ! -f "$file" ]; then continue; fi
            issue_number="$(bash scripts/spec-issue-sync-map.sh resolve "$file")"
            echo "同步 ${file} -> canonical issue #${issue_number}"
            bash scripts/spec-issue-sync.sh sync "${{ github.repository }}" "$file" "${issue_number}"
          done <<< "${{ steps.changed-specs.outputs.files }}"
