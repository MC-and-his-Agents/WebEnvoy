name: Test Gate

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install."
          fi

      - name: Run Unit Tests
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json found. Skipping unit tests."
            exit 0
          fi

          has_test_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts.test ? 'yes' : 'no')")"
          has_unit_tests="no"
          if find . -type d -name __tests__ -print -quit | grep -q .; then
            has_unit_tests="yes"
          fi

          if [ "$has_test_script" = "yes" ] && [ "$has_unit_tests" = "yes" ]; then
            echo "Running unit tests..."
            npm test -- --testPathPattern=__tests__
          else
            echo "No unit test command or __tests__ directories found. Skipping unit tests."
          fi

      - name: Run E2E/Integration Tests
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "No package.json found. Skipping E2E/integration tests."
            exit 0
          fi

          has_e2e_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts['test:e2e'] ? 'yes' : 'no')")"
          if [ -d tests ] && [ "$has_e2e_script" = "yes" ]; then
            echo "Running E2E/integration tests..."
            npm run test:e2e
          else
            echo "No tests directory or test:e2e script found. Skipping E2E/integration tests."
          fi
