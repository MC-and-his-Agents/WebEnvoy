name: Commit Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-commit:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check Commit Messages
        run: |
          CC_REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?: .+$'

          # 获取 PR 的所有提交记录
          COMMITS=$(git log --format=%s origin/${{ github.base_ref }}..origin/${{ github.head_ref }})
          
          echo "Checking commits:"
          echo "$COMMITS"
          
          # 遍历每个提交信息
          while IFS= read -r msg; do
            if [ -z "$msg" ]; then continue; fi
            
            echo "Validating: $msg"
            
            # 1. 校验 Conventional Commits 规范
            # 格式: type(scope): description 或 type: description
            if [[ ! "$msg" =~ $CC_REGEX ]]; then
              echo "错误: 提交信息必须符合 Conventional Commits 规范 (例如: feat: 增加某项功能)"
              exit 1
            fi
            
            # 2. 校验是否包含中文
            # GitHub Actions 默认 bash 对 \u4e00-\u9fa5 的正则兼容性不稳定，统一改为 perl 判断。
            if ! printf '%s\n' "$msg" | perl -Mutf8 -ne 'exit 0 if /[\x{4e00}-\x{9fff}]/; exit 1'; then
              echo "错误: 提交信息必须包含中文。"
              exit 1
            fi
            
          done <<< "$COMMITS"
          
          echo "所有提交信息校验通过！"
