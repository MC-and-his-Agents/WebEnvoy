name: Commit Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-commit:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check Commit Messages
        run: |
          CC_REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?: .+$'

          # 获取 PR 的所有提交记录
          COMMITS=$(git log --format=%s origin/${{ github.base_ref }}..origin/${{ github.head_ref }})
          
          echo "Checking commits:"
          echo "$COMMITS"
          
          # 遍历每个提交信息
          while IFS= read -r msg; do
            if [ -z "$msg" ]; then continue; fi
            
            echo "Validating: $msg"
            
            # 1. 校验 Conventional Commits 规范
            # 格式: type(scope): description 或 type: description
            if [[ ! "$msg" =~ $CC_REGEX ]]; then
              echo "错误: 提交信息必须符合 Conventional Commits 规范 (例如: feat: 增加某项功能)"
              exit 1
            fi
            
            # 2. 校验是否包含中文
            # 统一交给 Python 做 Unicode 判断，避免 shell/perl 在 runner 上的编码兼容问题。
            if ! python3 -c 'import sys; msg = sys.argv[1]; sys.exit(0 if any("\u4e00" <= ch <= "\u9fff" for ch in msg) else 1)' "$msg"; then
              echo "错误: 提交信息必须包含中文。"
              exit 1
            fi
            
          done <<< "$COMMITS"
          
          echo "所有提交信息校验通过！"
